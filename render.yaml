databases:
  - name: ethara-inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory

services:
  - type: web
    name: ethara-inventory-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./scripts/render-build.sh
    preDeployCommand: ./scripts/render-migrate.sh
    startCommand: ./scripts/render-start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethara-inventory-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: https://.*

  - type: web
    name: ethara-inventory-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ./scripts/render-build.sh
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
