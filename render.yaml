databases:
  - name: ethara-inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory

services:
  - type: web
    name: ethara-inventory-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./scripts/render-build.sh
    startCommand: ./scripts/render-start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethara-inventory-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: BACKEND_CORS_ORIGINS
        value: https://ethara-inventory-frontend-f9n8.onrender.com
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: https://.*\.onrender\.com

  - type: web
    name: ethara-inventory-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
